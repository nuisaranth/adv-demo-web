site:
  name: Team Digital Demo
  site: 'https://adv-demo-web.vercel.app'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Default SEO metadata
metadata:
  title:
    default: Team Digital - คอร์สเรียน AI และการตลาดดิจิทัล
    template: '%s — Team Digital Demo'
  description: "Team Digital Demo เป็นเว็บไซต์ตัวอย่าง สำหรับใช้คอร์สเรียน Digital Marketing 2026 + AI Tools"
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Team Digital Demo
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
  twitter:
    handle: '@arthelokyo'
    site: '@arthelokyo'
    cardType: summary_large_image

i18n:
  language: th
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog' # Blog main path, you can change this to "articles" (/articles)
      robots:
        index: true

    category:
      isEnabled: true
      pathname: 'category' # Category main path /category/some-category, you can change this to "group" (/group/some-category)
      robots:
        index: true

    tag:
      isEnabled: true
      pathname: 'tag' # Tag main path /tag/some-tag, you can change this to "topics" (/topics/some-category)
      robots:
        index: false

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

analytics:
  vendors:
    googleAnalytics:
      id: "G-XXXXXXXXXX" # เอาเลขจาก GA4 มาใส่ที่นี่

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
